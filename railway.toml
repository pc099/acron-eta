# Railway deployment config.
# See https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"
# Install the new backend's dependencies (not the root requirements.txt)
buildCommand = "pip install -r backend/requirements.txt"

[deploy]
preDeployCommand = "sh -c 'cd backend && PYTHONPATH=. python scripts/bootstrap_alembic.py'"
# Start the NEW backend (backend/app/main.py) - NOT the old src/api/app.py.
# backend/app/core/optimizer.py adds project root to sys.path for src/ imports.
startCommand = "sh -c 'cd backend && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# NOTE: To deploy the arq worker as a separate service on Railway:
# 1. Create a new service in Railway dashboard
# 2. Point it to this same repo
# 3. Set the start command to: sh -c 'cd backend && arq app.core.task_queue.WorkerSettings'
# 4. Use the same environment variables (REDIS_URL, DATABASE_URL, etc.)
# 5. The worker will consume jobs from the same Redis instance


